<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- daisy and tailwind  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Assignment 5</title>
    <!-- css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="shadow-sm">
      <nav class="flex justify-between max-w-[95%] mx-auto">
        <div class="logo flex justify-center items-center gap-2">
          <div class="w-9 h-9">
            <img src="./assets/github-logo.png" alt="logo" class="w-full" />
          </div>
          <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2 p-4 justify-center items-center">
          <input
            type="text"
            id="search-input"
            placeholder="Search here..."
            class="input input-bordered w-full shadow-sm"
          />
          <button
            id="search-btn"
            class="btn bg-[#4A00FF] text-white border-none"
          >
            Search
          </button>
        </div>
      </nav>
    </header>

    <main class="mt-14">
      <!-- tabs -->
      <section class="max-w-10/12 mx-auto">
        <div
          id="tabs-container"
          class="bg-white border border-gray-100 shadow-sm p-4"
        >
          <button class="btn px-10 btn-first border-none tabs-btn">All</button>
          <button class="btn px-10 tabs-btn">Open</button>
          <button class="btn px-10 tabs-btn">Closed</button>
        </div>
      </section>

      <!-- issues section  -->
      <section class="max-w-10/12 mx-auto mt-14">
        <!-- issues head  -->
        <div class="head-container flex justify-between p-4 shadow-sm items-center">
          <div class="left flex justify-center items-center gap-2.5">
            <div>
              <img src="./assets/Aperture.png" alt="" class="w-full"/>
            </div>
            <div>
              <h2 class="font-semibold text-2xl"><span id="total-issues">50</span> Issues</h2>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <div class="right flex justify-center items-center gap-5">
            <p class="flex justify-center items-center
            gap-1 "><span><i class="fa-solid fa-circle text-green-500"> </i></span><span class="text-lg font-medium">Open</span></p>
            <p class="flex justify-center items-center
            gap-1"><span><i class="fa-solid fa-circle text-purple-500"></i></span></i><span class="text-lg font-medium">Closed</span></p>
          </div>
        </div>
        <!-- card section  -->
         <div id="card-container" class="shadow-sm p-4">
            <!-- individual card  -->
            <div>
                
            </div>

         </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
