<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- daisy and tailwind  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Assignment 5</title>
    <!-- css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="shadow-sm">
      <nav class="flex justify-between max-w-[95%] mx-auto">
        <div class="logo flex justify-center items-center gap-2">
          <div class="w-9 h-9">
            <img src="./assets/github-logo.png" alt="logo" class="w-full" />
          </div>
          <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2 p-4 justify-center items-center">
          <input
            type="text"
            id="search-input"
            placeholder="Search here..."
            class="input input-bordered w-full shadow-sm"
          />
          <button
            id="search-btn"
            class="btn bg-[#4A00FF] text-white border-none"
          >
            Search
          </button>
        </div>
      </nav>
    </header>

    <main class="mt-14">
      <!-- tabs -->
      <section class="max-w-10/12 mx-auto">
        <div id="tabs-container" class="bg-white border border-gray-100 shadow-sm p-4">
          <button
            class="btn px-10 btn-first border-none tabs-btn"
          >
            All
          </button>
          <button class="btn  px-10 tabs-btn">
            Open
          </button>
          <button class="btn  px-10 tabs-btn">
            Closed
          </button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
