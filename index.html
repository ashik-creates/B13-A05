<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- daisy and tailwind  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Assignment 5</title>
    <!-- css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- login form -->
    <section class="min-h-screen w-full p-3 bg-gray-100 flex justify-center items-center">
      <div
        class="py-8 px-10 shadow-sm rounded-lg border border-gray-100 space-y-5 bg-white"
      >
        <div
          class="login-top flex flex-col justify-center items-center text-center space-y-4"
        >
          <div class="w-15 h-15">
            <img src="./assets/github-logo.png" alt="logo" class="w-full" />
          </div>
          <div>
            <h1 class="font-semibold text-2xl mb-2">GitHub Issues Tracker</h1>
            <p class="text-gray-400">Sign in to manage your issues</p>
          </div>
        </div>
        <div class="form">
          <fieldset class="fieldset bg-white rounded-box w-full">
            <label class="label text-lg font-medium text-black">Username</label>
            <input id="username-input"
              type="text"
              class="input w-full"
              placeholder="Enter Username"
            />

            <p class="text-sm text-[#4A00FF]">Default: admin</p>

            <label class="label text-lg font-medium text-black">Password</label>
            <input id="password-input"
              type="password"
              class="input w-full"
              placeholder="Enter Password"
            />

            <p class="text-sm text-[#4A00FF]">Default: admin123</p>

            <button id="login-btn" class="btn btn-neutral bg-[#4A00FF] border-[#4A00FF] text-lg p-6 mt-4">
              Sign In
            </button>
          </fieldset>
        </div>
        <div class="relative">
          <hr class="text-gray-300" />
          <h1
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white p-2"
          >
            OR
          </h1>
        </div>
        <div
          class="login-bottom flex flex-col justify-center items-center space-y-5 text-center"
        >
          <p class="text-gray-500">Demo Credentials:</p>
          <div>
            <h2 class="font-medium text-lg">Username: admin</h2>
            <h2 class="font-medium text-lg">Password: admin123</h2>
          </div>
        </div>
      </div>
    </section>

    <!-- script -->
    <script src="./login.js"></script>
  </body>
</html>
